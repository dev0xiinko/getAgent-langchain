<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GetAgent — Test Client</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c232d; --border: #2a313c;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --accent2: #238636;
    --user: #1f6feb33; --err: #f8514922;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 860px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { margin: 0 0 8px; font-size: 15px; }
  .setup { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .setup label { color: var(--muted); font-size: 12px; }
  input, select, textarea, button { font: inherit; color: var(--text); background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
  input:focus, textarea:focus { outline: 1px solid var(--accent); }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: transparent; }
  .pill { font-size: 12px; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 999px; }
  .bar { display: flex; gap: 8px; align-items: center; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  .modes { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .modes button { border: none; border-radius: 0; background: var(--panel2); }
  .modes button.active { background: var(--accent); color: #fff; }
  .grow { flex: 1; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); word-wrap: break-word; }
  .msg.user { background: var(--user); align-self: flex-end; max-width: 80%; }
  .msg.assistant { background: var(--panel); align-self: flex-start; max-width: 90%; }
  .msg.error { background: var(--err); border-color: #f85149; }
  .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .msg .body > :first-child { margin-top: 0; } .msg .body > :last-child { margin-bottom: 0; }
  .msg .body p { margin: 0 0 8px; } .msg .body ul, .msg .body ol { margin: 6px 0; padding-left: 22px; }
  .msg .body h1, .msg .body h2, .msg .body h3, .msg .body h4 { margin: 14px 0 6px; line-height: 1.3; }
  .msg .body h1 { font-size: 1.4em; } .msg .body h2 { font-size: 1.25em; } .msg .body h3 { font-size: 1.1em; }
  .msg img { max-width: 100%; border-radius: 6px; margin-top: 6px; display: block; }
  .msg .body code { background: #00000040; padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .92em; }
  .msg .body pre { background: #00000059; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; margin: 8px 0; overflow-x: auto; }
  .msg .body pre code { background: none; padding: 0; white-space: pre; }
  .msg .body blockquote { margin: 8px 0; padding: 2px 12px; border-left: 3px solid var(--accent); color: var(--muted); }
  .msg .body table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: .95em; }
  .msg .body th, .msg .body td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; }
  .msg .body th { background: var(--panel2, #1c232d); font-weight: 600; }
  .msg .body tbody tr:nth-child(even) { background: #ffffff08; }
  .status { font-size: 12px; color: var(--accent); font-style: italic; padding: 0 16px; min-height: 18px; }
  .composer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); align-items: flex-end; }
  .composer textarea { flex: 1; resize: none; min-height: 42px; max-height: 160px; }
  .empty { color: var(--muted); text-align: center; margin: auto; }
  code { background: #00000040; padding: 1px 4px; border-radius: 4px; }
  .err-banner { background: var(--err); border: 1px solid #f85149; color: #ffb4ab; padding: 8px 16px; font-size: 13px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>GetAgent — Test Client</h1>
    <div class="setup">
      <label>UID</label>
      <input id="uid" value="u1" style="width:90px" />
      <label>Role</label>
      <select id="role">
        <option>Member</option>
        <option>Lead Builder</option>
        <option>Manager</option>
      </select>
      <label><input type="checkbox" id="reddit" /> Reddit label</label>
      <button id="setUser" class="ghost">Set user</button>
      <span id="userPill" class="pill">not set</span>
    </div>
  </header>

  <div class="bar">
    <div class="modes">
      <button id="modeChat" class="active" data-mode="chat">Chat</button>
      <button id="modeImage" data-mode="image">Image</button>
    </div>
    <span id="aspectWrap" class="hidden">
      <label>Aspect</label>
      <select id="aspect">
        <option>1:1</option><option>16:9</option><option>9:16</option><option>4:3</option>
      </select>
    </span>
    <span class="grow"></span>
    <span id="usage" class="pill">usage: –</span>
    <button id="newSession" class="ghost">New session</button>
  </div>

  <div id="errBanner" class="err-banner hidden"></div>
  <div id="messages"><div class="empty">Set a user, then send a message.</div></div>
  <div id="status" class="status"></div>

  <div class="composer">
    <textarea id="input" placeholder="Ask something… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" class="primary">Send</button>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const api = (p) => p; // same origin
let mode = "chat";
let sending = false;

// ── helpers ──────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
// Rich renderer (parity with web/lib/markdown.ts): fenced code, tables, headings,
// blockquotes, lists, images, links, bold/italic, inline code. Escape-first → safe.
function mdInline(s) {
  return s
    .replace(/!\[[^\]]*\]\((https?:[^)]+|data:[^)]+)\)/g, '<img src="$1" alt="" />')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
}
function mdSplitRow(row) {
  let r = row.trim();
  if (r.startsWith("|")) r = r.slice(1);
  if (r.endsWith("|")) r = r.slice(0, -1);
  return r.split("|").map((c) => c.trim());
}
function mdIsSep(line) { return /\|/.test(line) && /-/.test(line) && /^[\s:|-]+$/.test(line.trim()); }
function mdTable(lines, start) {
  const aligns = mdSplitRow(lines[start + 1]).map((c) => {
    const l = c.startsWith(":"), r = c.endsWith(":");
    return l && r ? "center" : r ? "right" : l ? "left" : "";
  });
  const cell = (c, i, tag) => {
    const a = aligns[i] ? ' style="text-align:' + aligns[i] + '"' : "";
    return "<" + tag + a + ">" + mdInline(c) + "</" + tag + ">";
  };
  const head = mdSplitRow(lines[start]).map((c, i) => cell(c, i, "th")).join("");
  const body = [];
  let i = start + 2;
  for (; i < lines.length && lines[i].includes("|") && lines[i].trim(); i++)
    body.push("<tr>" + mdSplitRow(lines[i]).map((c, j) => cell(c, j, "td")).join("") + "</tr>");
  return { html: "<table><thead><tr>" + head + "</tr></thead><tbody>" + body.join("") + "</tbody></table>", next: i };
}
function render(text) {
  let html = escapeHtml(text);
  const blocks = [];
  const stash = (lang, code) => {
    const cls = (lang || "").replace(/[^a-z0-9]/gi, "").toLowerCase();
    blocks.push("<pre><code" + (cls ? ' class="lang-' + cls + '"' : "") + ">" + code.replace(/\n$/, "") + "</code></pre>");
    return " CB" + (blocks.length - 1) + " ";
  };
  html = html.replace(/```([^\n`]*)\n([\s\S]*?)```/g, (_m, l, c) => stash(l, c));
  html = html.replace(/```([^\n`]*)\n([\s\S]*)$/, (_m, l, c) => stash(l, c));

  const lines = html.split("\n");
  const out = [];
  let para = [];
  const flush = () => { if (para.length) { out.push("<p>" + para.map(mdInline).join("<br/>") + "</p>"); para = []; } };
  for (let i = 0; i < lines.length;) {
    const line = lines[i];
    if (/^ CB\d+ $/.test(line.trim())) { flush(); out.push(line.trim()); i++; continue; }
    if (!line.trim()) { flush(); i++; continue; }
    if (line.includes("|") && i + 1 < lines.length && mdIsSep(lines[i + 1])) {
      flush(); const t = mdTable(lines, i); out.push(t.html); i = t.next; continue;
    }
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { flush(); out.push("<h" + h[1].length + ">" + mdInline(h[2]) + "</h" + h[1].length + ">"); i++; continue; }
    if (/^&gt;\s?/.test(line)) {
      flush(); const buf = [];
      for (; i < lines.length && /^&gt;\s?/.test(lines[i]); i++) buf.push(lines[i].replace(/^&gt;\s?/, ""));
      out.push("<blockquote>" + buf.map(mdInline).join("<br/>") + "</blockquote>"); continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      flush(); const items = [];
      for (; i < lines.length && /^\d+\.\s+/.test(lines[i]); i++) items.push("<li>" + mdInline(lines[i].replace(/^\d+\.\s+/, "")) + "</li>");
      out.push("<ol>" + items.join("") + "</ol>"); continue;
    }
    if (/^[•\-*]\s+/.test(line)) {
      flush(); const items = [];
      for (; i < lines.length && /^[•\-*]\s+/.test(lines[i]); i++) items.push("<li>" + mdInline(lines[i].replace(/^[•\-*]\s+/, "")) + "</li>");
      out.push("<ul>" + items.join("") + "</ul>"); continue;
    }
    para.push(line); i++;
  }
  flush();
  return out.join("\n").replace(/ CB(\d+) /g, (_m, n) => blocks[Number(n)]);
}
function clearEmpty() { const e = $("messages").querySelector(".empty"); if (e) e.remove(); }
function addMsg(role, text, isError) {
  clearEmpty();
  const el = document.createElement("div");
  el.className = "msg " + role + (isError ? " error" : "");
  el.innerHTML = '<div class="role">' + role + "</div><div class='body'></div>";
  el.querySelector(".body").innerHTML = render(text || "");
  $("messages").appendChild(el);
  $("messages").scrollTop = $("messages").scrollHeight;
  return el;
}
function setBody(el, text) {
  el.querySelector(".body").innerHTML = render(text);
  $("messages").scrollTop = $("messages").scrollHeight;
}
function setStatus(s) { $("status").textContent = s || ""; }
function showErr(msg) {
  const b = $("errBanner");
  if (!msg) { b.classList.add("hidden"); return; }
  b.textContent = msg; b.classList.remove("hidden");
  setTimeout(() => b.classList.add("hidden"), 5000);
}
const uid = () => $("uid").value.trim();

// ── user setup (dev seed) ────────────────────────────────
async function setUser() {
  const labels = $("reddit").checked ? ["Reddit"] : [];
  const res = await fetch(api("/server/dev/seed-user"), {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ uid: uid(), role: $("role").value, labels }),
  });
  if (!res.ok) return showErr("Failed to set user (is the server in dev mode?)");
  const data = await res.json();
  $("userPill").textContent = data.user.role + (labels.length ? " · " + labels.join(",") : "");
  await Promise.all([loadSession(), loadUsage()]);
}

async function loadUsage() {
  try {
    const res = await fetch(api("/server/agent/usage?uid=" + encodeURIComponent(uid())));
    if (!res.ok) return;
    const u = await res.json();
    $("usage").textContent = "chat " + u.chatCount + "/" + u.chatLimit + " · img " + u.imageCount + "/" + u.imageLimit;
  } catch {}
}

async function loadSession() {
  try {
    const res = await fetch(api("/server/agent/session?uid=" + encodeURIComponent(uid())));
    if (!res.ok) return;
    const { messages } = await res.json();
    $("messages").innerHTML = "";
    if (!messages.length) { $("messages").innerHTML = '<div class="empty">No messages yet.</div>'; return; }
    for (const m of messages) addMsg(m.role, m.content, m.isError);
  } catch {}
}

async function newSession() {
  await fetch(api("/server/agent/session"), {
    method: "DELETE", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ uid: uid() }),
  });
  $("messages").innerHTML = '<div class="empty">Session cleared.</div>';
  loadUsage();
}

// ── chat (SSE via fetch + reader, matching the real client) ──
async function sendChat(message) {
  addMsg("user", message);
  const bubble = addMsg("assistant", "");
  setStatus("Thinking…");
  let acc = "";
  try {
    const res = await fetch(api("/server/agent/chat"), {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid: uid(), message }),
    });
    if (res.status === 429) {
      const d = await res.json().catch(() => ({}));
      setBody(bubble, "Daily limit reached.");
      bubble.classList.add("error");
      showErr("Rate limited (resetAt " + (d.resetAt ? new Date(d.resetAt).toLocaleString() : "?") + ")");
      return;
    }
    if (!res.ok) { setBody(bubble, "Request failed (" + res.status + ")"); bubble.classList.add("error"); return; }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") { setStatus(""); continue; }
        let p; try { p = JSON.parse(data); } catch { continue; }
        if (p.status) setStatus(p.status);
        if (p.image) { acc += "\n![image](" + p.image + ")\n"; setBody(bubble, acc); }
        if (p.token) { acc += p.token; setBody(bubble, acc); }
        if (p.error) { setBody(bubble, p.error); bubble.classList.add("error"); }
      }
    }
    if (!acc) { setBody(bubble, "(empty response)"); }
  } catch (e) {
    setBody(bubble, "Network error: " + e.message); bubble.classList.add("error");
  } finally {
    setStatus("");
    loadUsage();
  }
}

// ── image ────────────────────────────────────────────────
async function sendImage(prompt) {
  addMsg("user", prompt);
  const bubble = addMsg("assistant", "");
  setStatus("Generating image…");
  try {
    const res = await fetch(api("/server/agent/image"), {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid: uid(), prompt, aspectRatio: $("aspect").value }),
    });
    if (res.status === 429) { setBody(bubble, "Daily image limit reached."); bubble.classList.add("error"); return; }
    const data = await res.json();
    if (data.url) setBody(bubble, "![image](" + data.url + ")");
    else { setBody(bubble, data.error || "No image returned"); bubble.classList.add("error"); }
  } catch (e) {
    setBody(bubble, "Network error: " + e.message); bubble.classList.add("error");
  } finally {
    setStatus("");
    loadUsage();
  }
}

async function send() {
  if (sending) return;
  const text = $("input").value.trim();
  if (!text) return;
  if (!uid()) return showErr("Set a UID first.");
  sending = true; $("send").disabled = true; $("input").value = "";
  try {
    if (mode === "chat") await sendChat(text);
    else await sendImage(text);
  } finally {
    sending = false; $("send").disabled = false; $("input").focus();
  }
}

// ── wiring ───────────────────────────────────────────────
function setMode(m) {
  mode = m;
  $("modeChat").classList.toggle("active", m === "chat");
  $("modeImage").classList.toggle("active", m === "image");
  $("aspectWrap").classList.toggle("hidden", m !== "image");
  $("input").placeholder = m === "chat"
    ? "Ask something… (Enter to send, Shift+Enter for newline)"
    : "Describe an image to generate…";
}

$("modeChat").onclick = () => setMode("chat");
$("modeImage").onclick = () => setMode("image");
$("setUser").onclick = setUser;
$("newSession").onclick = newSession;
$("send").onclick = send;
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// auto-set the default user on load
setUser();
</script>
</body>
</html>
